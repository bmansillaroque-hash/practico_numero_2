<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Insumos</title>
    <!-- CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: rgb(255, 235, 240); font-family: 'Courier New', Courier, monospace; }
        .form-container { background: white; padding: 30px; border-radius: 10px; border: 2px solid black; margin-top: 50px; }
        h2 { color: rgb(10, 10, 10); }
    </style>
</head>
<body class="p-4">

<div class="container form-container col-md-6">
    <h2 class="text-center mb-4">Registro de Insumos</h2>
    
    <!-- formulario -->
    <form id="miFormulario" class="needs-validation" novalidate>
        <div class="mb-3">
            <label class="form-label">Nombre del Insumo</label>
            <input type="text" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha de Vencimiento</label>
            <input type="date" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">Registrar Insumo</button>
    </form>

    <!-- Mensaje de éxito -->
    <div id="mensajeExito" class="alert alert-success mt-3 d-none text-center">
        ¡Registro exitoso! Los datos han sido procesados.
    </div>
</div>

<script>
    const form = document.getElementById('miFormulario');
    const mensaje = document.getElementById('mensajeExito');

    form.addEventListener('submit', function (event) {
        // 1. Validamos si los campos están completos
        if (!form.checkValidity()) {
            event.preventDefault(); // Si falta algo, no se enví
            event.stopPropagation();
        } else {
            // 2. Si todo está bien mostramos el mensaje
            event.preventDefault();
            mensaje.classList.remove('d-none');
            form.reset(); // Limpiamos el formulario
        }
        form.classList.add('was-validated');
    }, false);
</script>

</body>
</html>
