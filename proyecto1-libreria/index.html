<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelería - Consulta de Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --rosa-pastel: rgb(255, 235, 240);
            --negro: rgb(10, 10, 10);
            --rosa-acento: rgb(255, 180, 200);
        }
        body { font-family: 'Courier New', Courier, monospace; background-color: var(--rosa-pastel); color: var(--negro); }
        .navbar { border-bottom: 2px solid var(--negro); background-color: white !important; }
        .carousel-inner { background-color: var(--rosa-acento); height: 300px; }
        .btn-negro { background-color: var(--negro); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="#">Papelería/libreria</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
            </ul>
        </div>
    </div>
</nav>

<div id="carruselPapeleria" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active"><div class="d-flex align-items-center justify-content-center h-100"><h1>Cuadernos y Agendas</h1></div></div>
        <div class="carousel-item"><div class="d-flex align-items-center justify-content-center h-100"><h1>Insumos de Oficina</h1></div></div>
    </div>
</div>

<div class="text-center my-5">
    <button class="btn btn-negro btn-lg" data-bs-toggle="modal" data-bs-target="#modalStock">
        Consultar Stock
    </button>
</div>

<div class="modal fade" id="modalStock" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">¿Qué artículo buscas?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control" placeholder="Ej: Resma A4">
            </div>
            <div class="modal-footer">
                <button class="btn btn-negro">Enviar Consulta</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
